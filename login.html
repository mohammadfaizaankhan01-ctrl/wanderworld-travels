<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WanderWorld Travels – Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    body {
      background: linear-gradient(180deg, #1a6fc4 0%, #3a9bd5 40%, #6ecff6 70%, #b8eaf8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── SUN ── */
    .sun {
      position: fixed;
      top: 40px; right: 120px;
      width: 70px; height: 70px;
      background: #ffe566;
      border-radius: 50%;
      box-shadow: 0 0 0 14px #ffe56640, 0 0 0 28px #ffe56620;
      z-index: 1;
      animation: sunPulse 4s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100% { box-shadow: 0 0 0 14px #ffe56640, 0 0 0 28px #ffe56620; }
      50%      { box-shadow: 0 0 0 20px #ffe56650, 0 0 0 40px #ffe56630; }
    }

    /* ── CLOUDS ── */
    .cloud-layer { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .cloud {
      position: absolute;
      background: #ffffffd0;
      border-radius: 50px;
    }
    .cloud::before, .cloud::after {
      content: ''; position: absolute;
      background: #ffffffd0; border-radius: 50%;
    }
    .c1 { width:130px;height:44px;top:10%;left:-150px;animation:drift 26s linear infinite; }
    .c1::before{width:70px;height:70px;top:-35px;left:18px}
    .c1::after{width:52px;height:52px;top:-25px;left:60px}
    .c2 { width:100px;height:34px;top:20%;left:-120px;animation:drift 20s linear infinite;animation-delay:-9s;opacity:.8; }
    .c2::before{width:50px;height:50px;top:-26px;left:12px}
    .c2::after{width:38px;height:38px;top:-18px;left:44px}
    .c3 { width:80px;height:28px;top:8%;left:-100px;animation:drift 32s linear infinite;animation-delay:-18s;opacity:.6; }
    .c3::before{width:40px;height:40px;top:-20px;left:10px}
    .c3::after{width:30px;height:30px;top:-14px;left:36px}
    @keyframes drift {
      from{transform:translateX(0)}
      to{transform:translateX(calc(100vw + 200px))}
    }

    /* ── MOUNTAINS (back layer) ── */
    .mountains {
      position: fixed;
      bottom: 90px; left: 0; right: 0;
      height: 200px;
      z-index: 3;
      pointer-events: none;
    }
    .mountains svg { width: 100%; height: 100%; }

    /* ── HILLS (front layer) ── */
    .hills {
      position: fixed;
      bottom: 80px; left: 0; right: 0;
      height: 130px;
      z-index: 4;
      pointer-events: none;
    }
    .hills svg { width: 100%; height: 100%; }

    /* ── GROUND ── */
    .ground {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 90px;
      background: linear-gradient(to bottom, #3a8c1e, #2a6614);
      z-index: 5;
    }

    /* ── ROAD ── */
    .road {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 58px;
      background: #444;
      z-index: 6;
      overflow: hidden;
    }
    .road::before {
      content: '';
      position: absolute;
      top: -6px; left: 0; right: 0;
      height: 12px;
      background: #5a5a5a;
      border-radius: 6px 6px 0 0;
    }
    /* white edge lines */
    .road::after {
      content: '';
      position: absolute;
      top: 4px; left: 0; right: 0;
      height: 3px;
      background: repeating-linear-gradient(90deg,
        #fff 0, #fff 30px,
        transparent 30px, transparent 60px
      );
      animation: roadEdge 0.6s linear infinite;
    }
    /* center dashes */
    .road-dashes {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      left: 0; right: 0;
      height: 5px;
      display: flex;
      gap: 0;
      animation: roadScroll 0.5s linear infinite;
      width: 200%;
    }
    .road-dash {
      flex-shrink: 0;
      width: 50px; height: 5px;
      background: #ffdd00;
      margin-right: 40px;
      border-radius: 2px;
    }
    @keyframes roadScroll {
      from{transform:translateY(-50%) translateX(0)}
      to{transform:translateY(-50%) translateX(-50%)}
    }
    @keyframes roadEdge {
      from{background-position:0 0}
      to{background-position:-60px 0}
    }

    /* ── CAR ── */
    .car-wrap {
      position: fixed;
      bottom: 52px;
      left: 60px;
      z-index: 8;
      animation: carBob 0.2s ease-in-out infinite alternate;
    }
    @keyframes carBob {
      from{transform:translateY(0)}
      to{transform:translateY(-2px)}
    }
    .car { position: relative; width: 110px; }

    /* car body */
    .car-body {
      width: 110px; height: 32px;
      background: linear-gradient(to bottom, #e63946, #c1121f);
      border-radius: 6px 6px 4px 4px;
      position: relative;
    }
    /* car roof */
    .car-roof {
      position: absolute;
      top: -24px; left: 18px;
      width: 72px; height: 26px;
      background: linear-gradient(to bottom, #c1121f, #e63946);
      border-radius: 12px 12px 0 0;
    }
    /* windshield */
    .car-roof::before {
      content: '';
      position: absolute;
      top: 4px; left: 6px;
      width: 24px; height: 16px;
      background: #a8d8ea;
      border-radius: 6px 4px 0 0;
      opacity: .9;
    }
    .car-roof::after {
      content: '';
      position: absolute;
      top: 4px; right: 6px;
      width: 24px; height: 16px;
      background: #a8d8ea;
      border-radius: 4px 6px 0 0;
      opacity: .9;
    }
    /* headlight */
    .car-body::before {
      content: '';
      position: absolute;
      right: 4px; top: 8px;
      width: 12px; height: 8px;
      background: #ffe566;
      border-radius: 3px;
      box-shadow: 0 0 8px 2px #ffe56680;
    }
    /* taillight */
    .car-body::after {
      content: '';
      position: absolute;
      left: 4px; top: 8px;
      width: 10px; height: 8px;
      background: #ff4444;
      border-radius: 3px;
    }
    /* wheels */
    .wheels { display: flex; justify-content: space-between; padding: 0 10px; margin-top: -2px; }
    .wheel {
      width: 24px; height: 24px;
      background: #222;
      border-radius: 50%;
      border: 3px solid #555;
      position: relative;
      animation: spin 0.3s linear infinite;
    }
    .wheel::before {
      content: '';
      position: absolute;
      inset: 3px;
      background: #888;
      border-radius: 50%;
    }
    .wheel::after {
      content: '';
      position: absolute;
      inset: 8px;
      background: #555;
      border-radius: 50%;
    }
    @keyframes spin {
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    /* exhaust */
    .exhaust {
      position: absolute;
      left: -6px; bottom: 6px;
      width: 8px; height: 6px;
      background: #888a;
      border-radius: 50%;
      animation: puff 0.6s ease-out infinite;
      transform-origin: left center;
    }
    @keyframes puff {
      0%{opacity:.7;transform:scaleX(1) scaleY(1) translateX(0)}
      100%{opacity:0;transform:scaleX(3) scaleY(2) translateX(-18px)}
    }

    /* ── TREES on hills ── */
    .trees { position: fixed; bottom: 78px; left: 0; right: 0; height: 80px; z-index: 7; pointer-events: none; }

    /* ── CARD ── */
    .scene { position: relative; z-index: 20; }

    .card {
      background: #ffffffee;
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 44px 40px 48px;
      width: 390px;
      max-width: 92vw;
      box-shadow: 0 10px 48px #00336640, 0 2px 8px #0002, inset 0 0 0 1px #ffffff90;
      animation: cardPop .6s cubic-bezier(.2,1.4,.4,1) both;
    }
    @keyframes cardPop {
      from{opacity:0;transform:translateY(36px) scale(.94)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    .brand { text-align: center; margin-bottom: 28px; }
    .brand-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
      animation: iconFloat 3s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%,100%{transform:translateY(0) rotate(-4deg)}
      50%{transform:translateY(-7px) rotate(4deg)}
    }
    .brand-name {
      font-size: 1.6rem; font-weight: 700;
      color: #0d2b5e; line-height: 1.2;
    }
    .brand-name span { color: #1565c0; }
    .tagline { font-size: .78rem; color: #6b90b8; margin-top: 3px; letter-spacing: .5px; }

    .field { position: relative; margin-bottom: 16px; }
    .field label {
      display: block; font-size: .7rem; font-weight: 600;
      color: #6b90b8; margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: .8px;
      transition: color .2s;
    }
    .field:focus-within label { color: #1565c0; }
    .field input {
      width: 100%; padding: 13px 16px 13px 44px;
      border: 1.5px solid #b0c8e8;
      border-radius: 12px; font-family: inherit;
      font-size: .93rem; background: #f0f7ff;
      color: #0d2b5e; outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .field input:focus {
      border-color: #1565c0; background: #fff;
      box-shadow: 0 0 0 4px #1565c018;
    }
    .field-icon {
      position: absolute; left: 13px; bottom: 13px;
      font-size: 1.1rem; pointer-events: none;
    }
    .eye-btn {
      position: absolute; right: 12px; bottom: 12px;
      background: none; border: none; cursor: pointer;
      font-size: 1.05rem; opacity: .45;
      transition: opacity .2s;
    }
    .eye-btn:hover { opacity: 1; }

    .options {
      display: flex; justify-content: space-between;
      align-items: center; font-size: .76rem;
      color: #6b90b8; margin-bottom: 22px;
    }
    .remember { display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .remember input { accent-color: #1565c0; cursor: pointer; }
    .forgot { color: #1565c0; text-decoration: none; font-weight: 600; }
    .forgot:hover { text-decoration: underline; }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      color: #fff; border: none; border-radius: 13px;
      font-family: inherit; font-size: .97rem; font-weight: 700;
      cursor: pointer; letter-spacing: .4px;
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 18px #1565c045;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 26px #1565c060; }
    .btn-login:active { transform: translateY(1px); }
    .btn-login::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(110deg,transparent 30%,#ffffff25 50%,transparent 70%);
      transform: translateX(-100%);
      animation: shimmer 2.4s ease-in-out infinite;
    }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 60%,100%{transform:translateX(100%)} }

    .divider {
      display: flex; align-items: center; gap: 8px;
      margin: 18px 0 14px; font-size: .73rem; color: #6b90b8;
    }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:#b0c8e8; }

    .social { display: flex; gap: 10px; }
    .btn-social {
      flex: 1; padding: 10px 8px;
      border: 1.5px solid #b0c8e8; background: #f5f9ff;
      border-radius: 11px; font-size: .8rem; font-family: inherit;
      font-weight: 600; color: #0d2b5e; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: background .2s, border-color .2s, transform .15s;
    }
    .btn-social:hover { background: #e8f0fe; border-color: #1565c0; transform: translateY(-1px); }

    .signup { text-align: center; margin-top: 18px; font-size: .78rem; color: #6b90b8; }
    .signup a { color: #1565c0; font-weight: 600; text-decoration: none; }
    .signup a:hover { text-decoration: underline; }

    .toast {
      position: fixed; bottom: 75px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #0d47a1ee; color: #fff;
      padding: 11px 26px; border-radius: 50px;
      font-size: .83rem; font-weight: 600;
      opacity: 0; pointer-events: none; z-index: 100;
      transition: opacity .35s, transform .35s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;transition:none!important}
    }
  </style>
</head>
<body>

  <!-- Sun -->
  <div class="sun"></div>

  <!-- Clouds -->
  <div class="cloud-layer">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
  </div>

  <!-- Mountains (back) -->
  <div class="mountains">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,200 0,120 120,30 240,100 360,20 520,110 620,40 740,90 860,10 1000,80 1100,30 1200,90 1320,20 1440,70 1440,200" fill="#7a9e7e" opacity="0.7"/>
      <polygon points="0,200 0,140 80,70 180,120 300,50 440,130 540,60 680,120 780,40 920,100 1020,50 1140,110 1260,50 1380,90 1440,60 1440,200" fill="#5a8460" opacity="0.8"/>
      <!-- snow caps -->
      <polygon points="340,20 360,20 380,50 320,50" fill="#eaf4fb" opacity=".9"/>
      <polygon points="840,10 860,10 878,38 824,38" fill="#eaf4fb" opacity=".9"/>
      <polygon points="1082,30 1100,30 1116,56 1066,56" fill="#eaf4fb" opacity=".9"/>
      <polygon points="102,30 120,30 138,60 84,60" fill="#eaf4fb" opacity=".9"/>
    </svg>
  </div>

  <!-- Hills (front) -->
  <div class="hills">
    <svg viewBox="0 0 1440 130" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,130 Q120,20 280,70 Q440,120 600,40 Q760,0 920,60 Q1080,120 1200,50 Q1320,10 1440,70 L1440,130 Z" fill="#4a9e3e"/>
      <path d="M0,130 Q80,60 200,90 Q360,130 500,70 Q640,30 800,80 Q960,130 1080,70 Q1220,20 1360,80 L1440,90 L1440,130 Z" fill="#3d8832" opacity="0.7"/>
    </svg>
  </div>

  <!-- Trees (SVG inline) -->
  <div class="trees">
    <svg width="100%" height="80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <!-- repeating tree pattern via JS -->
    </svg>
  </div>

  <!-- Ground -->
  <div class="ground"></div>

  <!-- Road -->
  <div class="road">
    <div class="road-dashes" id="roadDashes"></div>
  </div>

  <!-- Car -->
  <div class="car-wrap" id="car">
    <div class="car">
      <div style="position:relative;">
        <div class="car-roof"></div>
        <div class="car-body"></div>
        <div class="exhaust"></div>
      </div>
      <div class="wheels">
        <div class="wheel"></div>
        <div class="wheel"></div>
      </div>
    </div>
  </div>

  <!-- Login Card -->
  <div class="scene">
    <div class="card">
      <div class="brand">
        <span class="brand-icon">✈️</span>
        <div class="brand-name"><span>WanderWorld</span> Travels</div>
        <div class="tagline">Your journey begins here</div>
      </div>

      <div class="field">
        <label>Username</label>
        <span class="field-icon">👤</span>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
      </div>

      <div class="field">
        <label>Password</label>
        <span class="field-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="eye-btn" id="eyeBtn" type="button">👁️</button>
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" id="remember"/> Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button class="btn-login" id="loginBtn">🚗 &nbsp;Let's Go Explore!</button>

      <div class="divider">or sign in with</div>
      <div class="social">
        <button class="btn-social">🌐 Google</button>
        <button class="btn-social">🍎 Apple</button>
      </div>

      <div class="signup">New traveller? <a href="#">Create an account</a></div>
    </div>
  </div>

  <div class="toast" id="toast">🚗 Buckle up! Adventure awaits!</div>

  <script>
    // Road dashes
    const rd = document.getElementById('roadDashes');
    for(let i=0;i<50;i++){
      const d=document.createElement('div');
      d.className='road-dash';
      rd.appendChild(d);
    }

    // SVG Trees
    const treeSvg = document.querySelector('.trees svg');
    const treePositions = [5,10,16,22,28,35,42,50,57,64,70,78,85,92];
    treePositions.forEach(pct => {
      const x = (pct/100)*1440;
      const h = 30+Math.random()*25;
      const w = 18+Math.random()*10;
      treeSvg.innerHTML += `
        <rect x="${x-3}" y="${80-h/2}" width="6" height="${h/2}" fill="#4a3010"/>
        <polygon points="${x},${80-h} ${x-w/2},${80-h/2} ${x+w/2},${80-h/2}" fill="#2d7a1e"/>
        <polygon points="${x},${80-h-12}" x="${x}" points="${x},${60-h*0.6} ${x-w*0.4},${80-h} ${x+w*0.4},${80-h}" fill="#3a9a28"/>
      `;
    });

    // Password toggle
    const pwd = document.getElementById('password');
    document.getElementById('eyeBtn').addEventListener('click', () => {
      pwd.type = pwd.type==='password' ? 'text' : 'password';
    });

    // Login
    document.getElementById('loginBtn').addEventListener('click', () => {

  const u = document.getElementById('username').value.trim();
  const p = pwd.value.trim();

  const toast = document.getElementById('toast');

  if(!u || !p){

      toast.textContent = '⚠️ Please fill in all fields';
      toast.style.background = '#c0392bee';

      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'),3000);

      return;
  }

  toast.textContent = '✅ Login Successful!';
  toast.style.background = '#0d47a1ee';

  toast.classList.add('show');

  setTimeout(() => {

      window.location.href = "index.html";

  }, 1500);

});
  </script>
</body>
</html>
